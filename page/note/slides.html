---
layout: shell
---

<style>
  #md-raw {
    margin-left: calc(10%);
    margin-right: calc(5%);
    max-width: calc(80%);
  }
  .slide {
    padding: 1em;
  }
  #md-src {
    display: none;
  }
</style>

<sidebar-component>
  <table-of-slides></table-of-slides>
</sidebar-component>

<slides-component>
  <div id="md-raw"></div>
</slides-component>

<textarea id="md-src">
{{ page.content }}
</textarea>

<script type="module">
  import init, { convert } from 'https://homun-lang.github.io/markdown-to-html/markdown_to_html.js';
  await init();
  const src = document.getElementById('md-src').value;
  document.getElementById('md-raw').innerHTML = convert(src);

  await import('https://posetmage.com/wc/slides.es.js');
  await import('https://posetmage.com/wc/doc_ui.es.js');
</script>
